version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pathify-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pathify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pathify"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathify-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pathify?schema=public
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && node server.js"

volumes:
  postgres_data:
