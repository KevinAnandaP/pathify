services:
  db:
    image: postgres:16-alpine
    container_name: pathify-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alwayspromise
      POSTGRES_DB: pathify
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pathify"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pathify-web
    restart: always
    ports:
      - "3008:3008"
    environment:
      - DATABASE_URL=postgresql://postgres:alwayspromise@db:5432/pathify
      - NODE_ENV=production
      - PORT=3008
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && node server.js"

volumes:
  postgres_data:
